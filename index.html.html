<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shine Bright – NHS Booking Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F8F7F4;
      color: #1A1A2E;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: white;
      border-bottom: 1px solid #E5E7EB;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: linear-gradient(135deg, #0D7377, #14BDAC);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px;
    }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; line-height: 1.1; }
    .logo-sub { font-size: 10px; color: #9CA3AF; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Buttons ── */
    .btn {
      border: none; border-radius: 8px; padding: 8px 18px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #0D7377; color: white; }
    .btn-outline { background: white; border: 1.5px solid #E5E7EB; color: #374151; }
    .btn-green-soft { background: #F0FDFB; border: 1px solid #99E6E3; color: #0D7377; width: 100%; margin-top: 14px; padding: 8px; }

    /* ── Layout ── */
    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

    /* ── Screens ── */
    .screen { animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats row ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: 12px; padding: 18px 20px; border: 1px solid #F3F4F6; }
    .stat-label { font-size: 11px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; font-family: 'Playfair Display', serif; }
    .stat-suffix { font-size: 13px; font-weight: 500; color: #9CA3AF; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid #E5E7EB; cursor: pointer; background: white; color: #6B7280;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .tab.active { background: #0D7377; border-color: #0D7377; color: white; }

    /* ── Cohort cards ── */
    .cohort-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .cohort-card {
      background: white; border-radius: 14px; padding: 20px 22px;
      border: 1px solid #F3F4F6;
    }
    .cohort-card.full { border-color: #FEE2E2; }
    .cohort-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .cohort-run { font-size: 12px; color: #9CA3AF; font-weight: 600; }
    .full-badge {
      background: #FEE2E2; color: #991B1B; font-size: 10px;
      font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em;
    }
    .cohort-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .session-list { margin-top: 12px; display: flex; flex-direction: column; gap: 3px; }
    .session-row { font-size: 12px; color: #6B7280; display: flex; gap: 6px; }
    .session-num { color: #D1D5DB; }

    /* ── Capacity bar ── */
    .cap-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .cap-count { font-size: 12px; color: #6B7280; }
    .cap-left { font-size: 12px; font-weight: 600; }
    .cap-track { background: #E5E7EB; border-radius: 4px; height: 6px; overflow: hidden; }
    .cap-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

    /* ── Upload zone ── */
    .drop-zone {
      border: 2px dashed #D1D5DB; border-radius: 14px; padding: 48px 32px;
      text-align: center; background: white; cursor: pointer;
      transition: all 0.2s; margin-bottom: 20px;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #0D7377; background: #F0FDFB; }
    .drop-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .drop-sub { font-size: 13px; color: #9CA3AF; }

    /* ── Code block ── */
    .code-block {
      background: #1E293B; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    }
    .code-label { font-size: 11px; color: #64748B; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .code-text { font-size: 12px; color: #94A3B8; line-height: 1.8; font-family: monospace; white-space: pre-wrap; }
    .id-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .id-tag { background: #334155; color: #94A3B8; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: monospace; }

    /* ── Review table ── */
    .table-wrap { border: 1px solid #E5E7EB; border-radius: 12px; overflow: hidden; margin-bottom: 24px; background: white; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 14px; text-align: left; font-weight: 600; color: #6B7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; background: #F9FAFB; border-bottom: 1px solid #E5E7EB; }
    td { padding: 10px 14px; border-top: 1px solid #F3F4F6; }
    tr.invalid-row { background: #FFFBEB; }
    tr.even { background: white; }
    tr.odd { background: #FAFAFA; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-valid { background: #CCEFEE; color: #0D7377; }
    .badge-invalid { background: #FEE2E2; color: #991B1B; }
    .badge-cohort { background: #EDE9FE; color: #5B21B6; }
    .badge-missing { color: #EF4444; font-size: 11px; }

    .warn-box { background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #92400E; }

    /* ── Submit button ── */
    .submit-row { display: flex; gap: 10px; align-items: center; }
    .btn-submit {
      background: #0D7377; color: white; border: none; border-radius: 9px;
      padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 8px; font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .btn-submit:disabled { background: #CCEFEE; color: #0D7377; cursor: default; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid #0D7377;
      border-top-color: transparent; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }

    /* ── Confirmation ── */
    .confirm-banner {
      background: linear-gradient(135deg, #0D7377 0%, #14BDAC 100%);
      border-radius: 16px; padding: 32px 36px; margin-bottom: 28px; color: white;
    }
    .confirm-tick { font-size: 40px; margin-bottom: 8px; }
    .confirm-title { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; margin-bottom: 6px; }
    .confirm-sub { font-size: 14px; opacity: 0.85; }

    .next-box { background: #F0FDFB; border: 1px solid #99E6E3; border-radius: 12px; padding: 16px 20px; margin-bottom: 28px; }
    .next-title { font-size: 13px; font-weight: 600; color: #0D7377; margin-bottom: 12px; }
    .next-item { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .next-icon { font-size: 16px; }
    .next-item-title { font-size: 13px; font-weight: 600; color: #1F2937; }
    .next-item-desc { font-size: 12px; color: #6B7280; }

    /* ── Page title ── */
    .page-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: #6B7280; font-size: 14px; margin-bottom: 28px; }
    .section-title { font-size: 22px; font-family: 'Playfair Display', serif; font-weight: 700; margin-bottom: 4px; }
    .section-sub { color: #6B7280; font-size: 14px; margin-bottom: 24px; }

    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .cohort-grid { grid-template-columns: 1fr; }
      .header { padding: 0 16px; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-text">Shine Bright</div>
      <div class="logo-sub">NHS Staff Booking Portal</div>
    </div>
  </div>
  <div id="header-actions"></div>
</header>

<!-- ═══════════════════════════════ MAIN ═══════════════════════════════ -->
<main class="container">
  <div id="app"></div>
</main>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".csv" style="display:none" />

<script>
// ═══════════════════════ DATA ═══════════════════════

const COHORTS = [
  { id:"c1r1", label:"Cohort 1 – Early Intervention",   run:"Run 1", dates:["Wed 7 May, 6:00pm","Wed 14 May, 6:00pm","Wed 21 May, 6:00pm"],   capacity:150, enrolled:112, color:"#0D7377" },
  { id:"c1r2", label:"Cohort 1 – Early Intervention",   run:"Run 2", dates:["Thu 4 Sep, 6:00pm","Thu 11 Sep, 6:00pm","Thu 18 Sep, 6:00pm"],   capacity:150, enrolled:38,  color:"#0D7377" },
  { id:"c2r1", label:"Cohort 2 – Preventative Support", run:"Run 1", dates:["Tue 3 Jun, 12:00pm","Tue 10 Jun, 12:00pm","Tue 17 Jun, 12:00pm"], capacity:150, enrolled:150, color:"#1B4F72" },
  { id:"c2r2", label:"Cohort 2 – Preventative Support", run:"Run 2", dates:["Tue 7 Oct, 12:00pm","Tue 14 Oct, 12:00pm","Tue 21 Oct, 12:00pm"], capacity:150, enrolled:0,   color:"#1B4F72" },
  { id:"c3r1", label:"Cohort 3 – Mixed Population",     run:"Run 1", dates:["Mon 7 Jul, 5:30pm","Mon 14 Jul, 5:30pm","Mon 21 Jul, 5:30pm"],   capacity:150, enrolled:67,  color:"#6B3FA0" },
  { id:"c3r2", label:"Cohort 3 – Mixed Population",     run:"Run 2", dates:["Mon 2 Nov, 5:30pm","Mon 9 Nov, 5:30pm","Mon 16 Nov, 5:30pm"],   capacity:150, enrolled:0,   color:"#6B3FA0" },
];

const SAMPLE_CSV = `first_name,last_name,email,job_title,nhs_org,cohort_id
Sarah,Ahmed,s.ahmed@nhs.net,Staff Nurse,Cambridge University Hospitals,c1r1
James,Patel,j.patel@nhs.net,Physiotherapist,Norfolk & Norwich University Hospitals,c2r1
Emma,Clarke,e.clarke@nhs.net,GP Practice Manager,East Suffolk and North Essex,c1r1
Michael,Thompson,m.thompson@nhs.net,Healthcare Assistant,Bedfordshire Hospitals,c3r1
Invalid,Row,not-an-email,Some Title,Some Org,`;

// ═══════════════════════ STATE ═══════════════════════

let state = {
  view: "dashboard",       // dashboard | upload | review | confirmed
  activeTab: "all",
  cohorts: COHORTS.map(c => ({...c})),
  parsed: [],
  confirmedParticipants: [],
  submitting: false,
};

// ═══════════════════════ HELPERS ═══════════════════════

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());
  return lines.slice(1).map((line, i) => {
    const vals = line.split(",").map(v => v.trim());
    const row = {};
    headers.forEach((h, idx) => row[h] = vals[idx] || "");
    row._id = i;
    row._valid = row.email && row.email.includes("@") && row.first_name && row.cohort_id;
    return row;
  });
}

function capColor(enrolled, capacity) {
  const pct = enrolled / capacity * 100;
  if (enrolled >= capacity) return "#EF4444";
  if (pct > 70) return "#F59E0B";
  return "#10B981";
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ═══════════════════════ RENDER ═══════════════════════

function render() {
  document.getElementById("app").innerHTML = buildApp();
  document.getElementById("header-actions").innerHTML = buildHeaderActions();
  attachEvents();
}

function buildHeaderActions() {
  if (state.view === "dashboard") {
    return `<button class="btn btn-primary" onclick="setState({view:'upload'})">+ Enrol Staff</button>`;
  }
  return `<button class="btn btn-outline" onclick="setState({view:'dashboard'})">← Dashboard</button>`;
}

function buildApp() {
  if (state.view === "dashboard") return buildDashboard();
  if (state.view === "upload")    return buildUpload();
  if (state.view === "review")    return buildReview();
  if (state.view === "confirmed") return buildConfirmed();
  return "";
}

// ─── DASHBOARD ───
function buildDashboard() {
  const total = state.cohorts.reduce((s,c) => s + c.enrolled, 0);
  const totalCap = state.cohorts.reduce((s,c) => s + c.capacity, 0);
  const open = state.cohorts.filter(c => c.enrolled < c.capacity).length;
  const full = state.cohorts.filter(c => c.enrolled >= c.capacity).length;

  const filtered = state.activeTab === "all"
    ? state.cohorts
    : state.cohorts.filter(c => c.id.startsWith(state.activeTab));

  const stats = [
    { label:"Total enrolled",   value: total,       suffix: ` / ${totalCap}`, color:"#0D7377" },
    { label:"Cohorts open",     value: open,        suffix: " of 6",          color:"#14BDAC" },
    { label:"Fully booked",     value: full,        suffix: " cohorts",       color:"#F59E0B" },
    { label:"Target completion",value:"Mar 2027",   suffix: "",               color:"#6B3FA0" },
  ];

  return `
  <div class="screen">
    <div class="page-title">Programme Overview</div>
    <div class="page-sub">East of England NHS Region · April 2026 – March 2027</div>

    <div class="stats-grid">
      ${stats.map(s => `
        <div class="stat-card">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value" style="color:${s.color}">${s.value}<span class="stat-suffix">${s.suffix}</span></div>
        </div>
      `).join("")}
    </div>

    <div class="tabs">
      ${[["all","All cohorts"],["c1","Cohort 1"],["c2","Cohort 2"],["c3","Cohort 3"]].map(([k,l]) =>
        `<button class="tab ${state.activeTab===k?"active":""}" onclick="setTab('${k}')">${l}</button>`
      ).join("")}
    </div>

    <div class="cohort-grid">
      ${filtered.map(c => buildCohortCard(c)).join("")}
    </div>
  </div>`;
}

function buildCohortCard(c) {
  const full = c.enrolled >= c.capacity;
  const pct = Math.min(c.enrolled / c.capacity * 100, 100);
  const color = capColor(c.enrolled, c.capacity);

  return `
  <div class="cohort-card ${full?"full":""}" style="border-left:4px solid ${c.color}">
    <div class="cohort-header">
      <div>
        <div class="cohort-name">${c.label}</div>
        <div class="cohort-run">${c.run}</div>
      </div>
      ${full ? `<span class="full-badge">FULL</span>` : ""}
    </div>

    <div class="cap-row">
      <span class="cap-count">${c.enrolled} / ${c.capacity} enrolled</span>
      <span class="cap-left" style="color:${color}">${full ? "FULL" : `${c.capacity - c.enrolled} places left`}</span>
    </div>
    <div class="cap-track">
      <div class="cap-fill" style="width:${pct}%; background:${color}"></div>
    </div>

    <div class="session-list">
      ${c.dates.map((d,i) => `
        <div class="session-row">
          <span class="session-num">Session ${i+1}</span>
          <span>${d}</span>
        </div>
      `).join("")}
    </div>

    ${!full ? `<button class="btn btn-green-soft" onclick="setState({view:'upload'})">Enrol staff →</button>` : ""}
  </div>`;
}

// ─── UPLOAD ───
function buildUpload() {
  return `
  <div class="screen">
    <div class="section-title">Upload participant list</div>
    <div class="section-sub">Upload a CSV file with your staff details. Each row will be validated before enrolment.</div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📂</div>
      <div class="drop-title">Drop your CSV here or click to browse</div>
      <div class="drop-sub">Accepted format: .csv with headers matching the template below</div>
    </div>

    <div class="code-block">
      <div class="code-label">Required CSV format</div>
      <div class="code-text">first_name, last_name, email, job_title, nhs_org, cohort_id
Sarah, Ahmed, s.ahmed@nhs.net, Staff Nurse, Cambridge UH, c1r1</div>
      <div class="id-tags">
        ${state.cohorts.map(c => `<span class="id-tag">${c.id} = ${c.run}</span>`).join("")}
      </div>
    </div>

    <button class="btn btn-outline" onclick="loadSample()">Load sample data →</button>
  </div>`;
}

// ─── REVIEW ───
function buildReview() {
  const valid = state.parsed.filter(p => p._valid);
  const invalid = state.parsed.filter(p => !p._valid);

  return `
  <div class="screen">
    <div class="section-title">Review &amp; confirm</div>
    <div class="section-sub">${valid.length} valid · ${invalid.length} invalid · ${state.parsed.length} total rows</div>

    ${invalid.length ? `<div class="warn-box">⚠ ${invalid.length} row(s) have missing or invalid fields and will be skipped.</div>` : ""}

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Status</th><th>Name</th><th>Email</th><th>Organisation</th><th>Cohort</th></tr>
        </thead>
        <tbody>
          ${state.parsed.map((p, i) => `
            <tr class="${!p._valid ? "invalid-row" : i%2===0 ? "even" : "odd"}">
              <td><span class="badge ${p._valid?"badge-valid":"badge-invalid"}">${p._valid?"● Valid":"● Invalid"}</span></td>
              <td style="font-weight:500">${p.first_name||""} ${p.last_name||""}</td>
              <td style="color:#6B7280">${p.email||""}</td>
              <td style="color:#6B7280">${p.nhs_org||""}</td>
              <td>${p.cohort_id
                ? `<span class="badge badge-cohort">${p.cohort_id}</span>`
                : `<span class="badge-missing">missing</span>`}
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>

    <div class="submit-row">
      <button class="btn-submit" id="submit-btn" onclick="handleSubmit()" ${state.submitting || valid.length===0 ? "disabled" : ""}>
        ${state.submitting
          ? `<span class="spinner"></span> Enrolling…`
          : `Confirm enrolment of ${valid.length} staff`}
      </button>
      <button class="btn btn-outline" onclick="setState({view:'upload'})">← Re-upload</button>
    </div>
  </div>`;
}

// ─── CONFIRMED ───
function buildConfirmed() {
  const ps = state.confirmedParticipants;
  const next = [
    ["📧","Welcome email","Sent immediately with programme materials and FAQs"],
    ["📅","Teams invite","Calendar invites for all 3 sessions sent within 5 minutes"],
    ["🔔","Reminders","Automatic reminder 48 hours before each session"],
    ["💬","Post-session nudge","Behavioural exercises sent after each session"],
  ];

  return `
  <div class="screen">
    <div class="confirm-banner">
      <div class="confirm-tick">✓</div>
      <div class="confirm-title">Enrolment submitted</div>
      <div class="confirm-sub">${ps.length} participant${ps.length!==1?"s":""} enrolled. Welcome emails and Teams invites will be sent automatically.</div>
    </div>

    <div class="next-box">
      <div class="next-title">What happens next</div>
      ${next.map(([icon, title, desc]) => `
        <div class="next-item">
          <span class="next-icon">${icon}</span>
          <div>
            <div class="next-item-title">${title}</div>
            <div class="next-item-desc">${desc}</div>
          </div>
        </div>
      `).join("")}
    </div>

    <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px">Enrolled participants</div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead>
          <tr><th>Name</th><th>Email</th><th>Organisation</th><th>Cohort</th></tr>
        </thead>
        <tbody>
          ${ps.map((p, i) => {
            const cohort = COHORTS.find(c => c.id === p.cohort_id);
            return `
            <tr class="${i%2===0?"even":"odd"}">
              <td style="font-weight:500">${p.first_name} ${p.last_name}</td>
              <td style="color:#6B7280">${p.email}</td>
              <td style="color:#6B7280">${p.nhs_org}</td>
              <td><span class="badge badge-cohort">${cohort ? cohort.run : p.cohort_id}</span></td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    <button class="btn btn-outline" onclick="setState({view:'dashboard'})">← Back to dashboard</button>
  </div>`;
}

// ═══════════════════════ EVENTS ═══════════════════════

function attachEvents() {
  // File input
  const fileInput = document.getElementById("file-input");
  if (fileInput) {
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const parsed = parseCSV(ev.target.result);
        setState({ parsed, view: "review" });
      };
      reader.readAsText(file);
      fileInput.value = "";
    };
  }

  // Drag and drop
  const dz = document.getElementById("drop-zone");
  if (dz) {
    dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("over"); });
    dz.addEventListener("dragleave", () => dz.classList.remove("over"));
    dz.addEventListener("drop", (e) => {
      e.preventDefault();
      dz.classList.remove("over");
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        setState({ parsed: parseCSV(ev.target.result), view: "review" });
      };
      reader.readAsText(file);
    });
  }
}

function setTab(tab) {
  setState({ activeTab: tab });
}

function loadSample() {
  setState({ parsed: parseCSV(SAMPLE_CSV), view: "review" });
}

function handleSubmit() {
  if (state.submitting) return;
  setState({ submitting: true });

  setTimeout(() => {
    const valid = state.parsed.filter(p => p._valid);

    const updatedCohorts = state.cohorts.map(c => {
      const added = valid.filter(p => p.cohort_id === c.id).length;
      return added ? { ...c, enrolled: Math.min(c.enrolled + added, c.capacity) } : c;
    });

    setState({
      submitting: false,
      cohorts: updatedCohorts,
      confirmedParticipants: valid,
      view: "confirmed",
    });
  }, 1600);
}

// ═══════════════════════ INIT ═══════════════════════
render();
</script>
</body>
</html>
